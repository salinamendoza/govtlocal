name = "emergency-resource-directory"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

# D1 and KV bindings are configured in the Cloudflare Pages dashboard:
#   Settings → Functions → Bindings
# Add:
#   - D1 database binding: variable name DB → emergency-resources
#   - KV namespace binding: variable name RATELIMIT → your namespace
